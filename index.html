<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Voice Pitch Keyboard</title>
  <style>
    :root {
      --bg: #101217;
      --surface: #181b22;
      --surface-2: #1f2430;
      --text: #f1f3f8;
      --muted: #a3acbf;
      --accent-red: #ff1212;
      --in-tune: #98ff12;
      --flat: #12a0ff;
      --sharp: #f24216;
      --key-border: #2d3343;
      --white-key: #f4f7ff;
      --black-key: #0a0d14;
      --keyboard-width: 100%;
      --white-key-width: 50px;
      --white-key-height: 230px;
      --black-key-width: 30px;
      --black-key-height: 140px;
      --zoom: 1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: var(--text);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    .app {
      width: min(1200px, 100%);
      min-height: 100vh;
      background: rgba(24, 27, 34, 0.9);
      border: 1px solid #2a3040;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 16px;
      gap: 8px;
    }

    .top-controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid #35405a;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.2s ease;
    }

    button:hover:not(:disabled) {
      border-color: #4e5d82;
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .pitch-panel {
      width: 100%;
      height: 180px;
      border-radius: 14px;
      border: 1px solid #2a3040;
      background: #24322a;
      position: relative;
      margin-bottom: 14px;
      transition: background-color 0.15s ease;
      overflow: hidden;
    }

    .center-marker {
      position: absolute;
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.4);
      pointer-events: none;
    }

    .needle {
      position: absolute;
      top: 50%;
      width: 6px;
      height: 140px;
      border-radius: 3px;
      background: #ffffff;
      transform: translateX(-50%);
      transition: left 0.25s ease-out, opacity 0.1s ease-in;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }

    .needle.locked {
      box-shadow:
        0 0 12px 4px rgba(180, 255, 180, 0.7),
        0 0 24px 8px rgba(100, 255, 100, 0.3);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.75; }
    }

    .cents-indicator {
      position: absolute;
      right: 10px;
      bottom: 8px;
      font-size: 13px;
      color: #fff;
      opacity: 0.7;
      pointer-events: none;
      display: none;
    }

    .history-select {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid #35405a;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.85rem;
    }

    .history-dot {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
    }

    .white-key .history-dot {
      background: #000;
    }

    .black-key .history-dot {
      background: #fff;
    }

    .keyboard-frame {
      background: #12151d;
      border: 1px solid #2a3040;
      border-radius: 12px;
      padding: 14px;
      overflow: hidden;
    }

    .keyboard-viewport {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    .keyboard {
      position: relative;
      height: calc(var(--white-key-height) * var(--zoom));
      width: calc(22 * var(--white-key-width) * var(--zoom));
      margin: 0;
      transform-origin: top left;
      user-select: none;
    }

    .white-key {
      position: absolute;
      bottom: 0;
      width: calc(var(--white-key-width) * var(--zoom));
      height: calc(var(--white-key-height) * var(--zoom));
      background: var(--white-key);
      border: 1px solid var(--key-border);
      border-radius: 0 0 8px 8px;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 9px;
      color: #333a4a;
      font-size: 9px;
      font-weight: 700;
    }

    .black-key {
      position: absolute;
      top: 0;
      width: calc(var(--black-key-width) * var(--zoom));
      height: calc(var(--black-key-height) * var(--zoom));
      background: var(--black-key);
      border: 1px solid #000;
      border-radius: 0 0 6px 6px;
      z-index: 2;
      color: #b9c1d5;
      font-size: 9px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 8px;
      font-weight: 700;
    }

    .white-key.active,
    .black-key.active {
      background: var(--accent-red);
      color: #ffffff;
      border-color: #ff7171;
    }

    @media (max-height: 500px) and (orientation: landscape) {
      :root {
        --white-key-height: 120px;
        --black-key-height: 75px;
      }

      body {
        padding: 8px;
      }

      .app {
        padding: 10px;
      }

      .top {
        margin-bottom: 8px;
      }

      button {
        padding: 6px 9px;
        font-size: 0.8rem;
        border-radius: 8px;
      }

      .pitch-panel {
        height: 90px;
        margin-bottom: 8px;
      }

      .needle {
        height: 72px;
      }

      .keyboard-frame {
        padding: 8px;
      }

      .top {
        margin-bottom: 6px;
      }
    }

  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <button id="startBtn">Start microphone</button>
      <div class="top-controls">
        <button id="historyToggleBtn" type="button">History ON</button>
        <select id="historyLimitSelect" class="history-select" aria-label="History note count">
          <option value="3">3</option>
          <option value="5">5</option>
          <option value="8" selected>8</option>
          <option value="10">10</option>
        </select>
      </div>
    </div>

    <section class="pitch-panel" id="pitchPanel">
      <div class="center-marker"></div>
      <div class="needle" id="needle" style="left: 50%;"></div>
      <div class="cents-indicator" id="centsIndicator">+0¢</div>
    </section>

    <section class="keyboard-frame">
      <div class="keyboard-viewport">
        <div class="keyboard" id="keyboard"></div>
      </div>
    </section>
  </main>

  <script>
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const WHITE_NOTES = new Set(["C", "D", "E", "F", "G", "A", "B"]);
    const MIN_MIDI = 41; // F2
    const MAX_MIDI = 77; // F5
    const RMS_THRESHOLD = 0.002;
    const FREQ_EMA_ALPHA = 0.25;
    const DISPLAY_CENTS_ALPHA = 0.05;
    const COMMIT_BUFFER_SIZE = 30;
    const DOMINANCE_THRESHOLD = 0.5;
    const MIN_LISTEN_WINDOW_MS = 600;
    const COMMIT_INTERVAL_MS = 300;
    const AUTO_SCROLL_DEBOUNCE_MS = 500;
    const SILENCE_RESET_MS = 2000;
    const YIN_CONFIDENCE_MIN = 0.15;

    const keyboardEl = document.getElementById("keyboard");
    const startBtn = document.getElementById("startBtn");
    const pitchPanel = document.getElementById("pitchPanel");
    const needle = document.getElementById("needle");
    const centsIndicator = document.getElementById("centsIndicator");
    const historyToggleBtn = document.getElementById("historyToggleBtn");
    const historyLimitSelect = document.getElementById("historyLimitSelect");

    let audioContext;
    let analyser;
    let buffer;
    let highPassFilter;
    let micStream;
    let currentActiveKey = null;
    let animationId = null;
    let zoom = 1;
    let frameCounter = 0;
    let noPitchFrames = 0;
    let emaFrequency = null;
    let displayedCents = 0;
    let pitchFrames = [];
    let committedMidi = null;
    let committedCents = 0;
    let lastCommitMs = 0;
    let currentActiveMidi = null;
    let lastAutoScrollMs = 0;
    let silenceStartMs = null;
    let silenceCleared = false;
    let toneContext = null;
    let toneOscillator = null;
    let toneGain = null;
    let toneStopTimer = null;
    let historyEnabled = true;
    let historyLimit = 8;
    let noteHistory = [];

    const keyByMidi = new Map();
    buildKeyboard();

    function midiToNote(midi) {
      const name = NOTE_NAMES[midi % 12];
      const octave = Math.floor(midi / 12) - 1;
      return { name, octave, label: `${name}${octave}` };
    }

    function frequencyToMidi(freq) {
      return 69 + 12 * Math.log2(freq / 440);
    }

    function midiToFrequency(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function centsOff(freq, nearestMidi) {
      const refFreq = midiToFrequency(nearestMidi);
      return 1200 * Math.log2(freq / refFreq);
    }

    function buildKeyboard() {
      keyboardEl.innerHTML = "";
      keyByMidi.clear();

      let whiteIndex = 0;
      for (let midi = MIN_MIDI; midi <= MAX_MIDI; midi++) {
        const { name, label } = midiToNote(midi);
        const isWhite = WHITE_NOTES.has(name);
        const key = document.createElement("div");
        key.dataset.midi = String(midi);
        key.textContent = label;

        if (isWhite) {
          key.className = "white-key";
          key.style.left = `calc(${whiteIndex} * var(--white-key-width) * var(--zoom))`;
          whiteIndex += 1;
        } else {
          key.className = "black-key";
          const left = whiteIndex - 1;
          key.style.left = `calc((${left} + 1) * var(--white-key-width) * var(--zoom) - (var(--black-key-width) * var(--zoom) / 2))`;
        }

        key.addEventListener("pointerdown", async () => {
          await playReferenceToneForMidi(midi);
        });

        keyboardEl.appendChild(key);
        keyByMidi.set(midi, key);
      }
    }

    async function getToneAudioContext() {
      if (audioContext) return audioContext;
      if (!toneContext || toneContext.state === "closed") {
        toneContext = new AudioContextClass();
      }
      if (toneContext.state === "suspended") {
        await toneContext.resume();
      }
      return toneContext;
    }

    function stopReferenceTone() {
      if (toneStopTimer) {
        clearTimeout(toneStopTimer);
        toneStopTimer = null;
      }
      if (toneOscillator) {
        try {
          toneOscillator.stop();
        } catch (_) {
          // Oscillator may already be stopped.
        }
        toneOscillator.disconnect();
        toneOscillator = null;
      }
      if (toneGain) {
        toneGain.disconnect();
        toneGain = null;
      }
    }

    async function playReferenceToneForMidi(midi) {
      if (!AudioContextClass) return;
      const ctx = await getToneAudioContext();
      stopReferenceTone();

      const now = ctx.currentTime;
      const frequency = midiToFrequency(midi);
      const gainNode = ctx.createGain();
      const osc = ctx.createOscillator();
      osc.type = "sine";
      osc.frequency.setValueAtTime(frequency, now);

      gainNode.gain.setValueAtTime(0.0001, now);
      gainNode.gain.linearRampToValueAtTime(0.22, now + 0.01);
      gainNode.gain.setValueAtTime(0.22, now + 1.2);
      gainNode.gain.linearRampToValueAtTime(0.0001, now + 1.5);

      osc.connect(gainNode);
      gainNode.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 1.5);

      toneOscillator = osc;
      toneGain = gainNode;
      toneStopTimer = setTimeout(() => {
        stopReferenceTone();
      }, 1650);
    }

    function clearKeyHighlight() {
      if (currentActiveKey) {
        currentActiveKey.classList.remove("active");
        currentActiveKey = null;
      }
      currentActiveMidi = null;
    }

    function setKeyHighlight(midi, shouldScroll) {
      if (currentActiveMidi === midi) return;
      clearKeyHighlight();
      const key = keyByMidi.get(midi);
      if (key) {
        key.classList.add("active");
        currentActiveKey = key;
        currentActiveMidi = midi;
        if (shouldScroll) {
          key.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        }
      }
    }

    function detectPitchYIN(samples, sampleRate) {
      let rms = 0;
      const size = samples.length;
      for (let i = 0; i < size; i++) {
        const v = samples[i];
        rms += v * v;
      }
      rms = Math.sqrt(rms / size);
      if (rms < RMS_THRESHOLD) return null;

      const yinSize = Math.floor(size / 2);
      const yinBuffer = new Float32Array(yinSize);
      yinBuffer[0] = 1;

      for (let tau = 1; tau < yinSize; tau++) {
        let sum = 0;
        for (let i = 0; i < yinSize; i++) {
          const delta = samples[i] - samples[i + tau];
          sum += delta * delta;
        }
        yinBuffer[tau] = sum;
      }

      let runningSum = 0;
      for (let tau = 1; tau < yinSize; tau++) {
        runningSum += yinBuffer[tau];
        if (runningSum === 0) {
          yinBuffer[tau] = 1;
        } else {
          yinBuffer[tau] = (yinBuffer[tau] * tau) / runningSum;
        }
      }

      let tauEstimate = -1;
      const threshold = 0.10;
      for (let tau = 2; tau < yinSize - 1; tau++) {
        if (yinBuffer[tau] < threshold && yinBuffer[tau] < yinBuffer[tau - 1]) {
          while (tau + 1 < yinSize && yinBuffer[tau + 1] < yinBuffer[tau]) {
            tau += 1;
          }
          tauEstimate = tau;
          break;
        }
      }

      if (tauEstimate === -1) {
        // Fallback to the global minimum so we still return a useful pitch in noisy conditions.
        let minPos = 2;
        let minVal = yinBuffer[minPos];
        for (let tau = 3; tau < yinSize; tau++) {
          if (yinBuffer[tau] < minVal) {
            minVal = yinBuffer[tau];
            minPos = tau;
          }
        }
        tauEstimate = minPos;
      }

      const x1 = yinBuffer[tauEstimate - 1] ?? yinBuffer[tauEstimate];
      const x2 = yinBuffer[tauEstimate];
      const x3 = yinBuffer[tauEstimate + 1] ?? yinBuffer[tauEstimate];
      const a = (x1 + x3 - 2 * x2) / 2;
      const b = (x3 - x1) / 2;
      const shift = a ? -b / (2 * a) : 0;
      const period = tauEstimate + shift;
      if (!isFinite(period) || period <= 0) return null;

      const frequency = sampleRate / period;
      if (frequency < 80 || frequency > 1100) return null;

      const confidence = 1 - Math.min(1, yinBuffer[tauEstimate]);
      if (confidence < YIN_CONFIDENCE_MIN) return null;

      return { frequency, confidence };
    }

    function resetPitchTracking() {
      emaFrequency = null;
      displayedCents = 0;
      pitchFrames = [];
      committedMidi = null;
      committedCents = 0;
      lastCommitMs = 0;
      centsIndicator.style.display = "none";
      needle.classList.remove("locked");
    }

    function updateUIFromCommittedState(cents) {
      let leftPercent = 50;
      const absCents = Math.abs(cents);

      // Needle deadzone: stay perfectly centered within +/-5 cents.
      if (absCents > 5) {
        const sign = cents > 0 ? 1 : -1;
        const scaled = Math.min(1, (absCents - 5) / 20); // 5..25 cents -> 0..1
        leftPercent = sign > 0
          ? 50 + scaled * 50
          : 50 - scaled * 50;
      }

      needle.style.left = `${leftPercent}%`;

      const clampedAbs = Math.min(25, absCents);
      if (clampedAbs <= 10) {
        pitchPanel.style.backgroundColor = "#27ae60";
      } else if (clampedAbs >= 25) {
        pitchPanel.style.backgroundColor = "#c0392b";
      } else {
        const ratio = (clampedAbs - 10) / 15; // 10..25 cents -> 0..1
        // Blend from yellow (#f1c40f) to red (#c0392b)
        const red = Math.round(241 + ratio * (192 - 241));
        const green = Math.round(196 + ratio * (57 - 196));
        const blue = Math.round(15 + ratio * (43 - 15));
        pitchPanel.style.backgroundColor = `rgb(${red}, ${green}, ${blue})`;
      }

      if (Math.abs(cents) <= 10) {
        needle.classList.add("locked");
      } else {
        needle.classList.remove("locked");
      }

      if (Math.abs(cents) > 5 && committedMidi !== null) {
        const rounded = Math.round(cents);
        const sign = rounded > 0 ? "+" : "";
        centsIndicator.textContent = `${sign}${rounded}¢`;
        centsIndicator.style.display = "block";
      } else {
        centsIndicator.style.display = "none";
      }

    }

    function clearHistoryDots() {
      for (const key of keyByMidi.values()) {
        const dot = key.querySelector(".history-dot");
        if (dot) dot.remove();
      }
    }

    function renderHistoryDots() {
      clearHistoryDots();
      if (!historyEnabled) {
        historyToggleBtn.textContent = "History OFF";
        return;
      }

      historyToggleBtn.textContent = "History ON";
      for (const midi of noteHistory) {
        const key = keyByMidi.get(midi);
        if (!key) continue;
        const dot = document.createElement("div");
        dot.className = "history-dot";
        key.appendChild(dot);
      }
    }

    function pushPitchFrame(midi, cents) {
      pitchFrames.push({ midi, cents, time: performance.now() });
      if (pitchFrames.length > COMMIT_BUFFER_SIZE) {
        pitchFrames.shift();
      }
    }

    function tryCommitDominantNote(nowMs) {
      if (nowMs - lastCommitMs < COMMIT_INTERVAL_MS) return;
      if (pitchFrames.length < Math.floor(COMMIT_BUFFER_SIZE * 0.6)) return;
      const windowMs = pitchFrames[pitchFrames.length - 1].time - pitchFrames[0].time;
      if (windowMs < MIN_LISTEN_WINDOW_MS) return;

      const counts = new Map();
      for (const frame of pitchFrames) {
        counts.set(frame.midi, (counts.get(frame.midi) ?? 0) + 1);
      }

      let dominantMidi = null;
      let dominantCount = 0;
      for (const [midi, count] of counts) {
        if (count > dominantCount) {
          dominantCount = count;
          dominantMidi = midi;
        }
      }
      if (dominantMidi === null) return;

      const dominance = dominantCount / pitchFrames.length;
      if (dominance < DOMINANCE_THRESHOLD) return;

      let centsSum = 0;
      let centsCount = 0;
      for (const frame of pitchFrames) {
        if (frame.midi === dominantMidi) {
          centsSum += frame.cents;
          centsCount += 1;
        }
      }
      if (!centsCount) return;

      const previousCommittedMidi = committedMidi;
      committedMidi = dominantMidi;
      committedCents = centsSum / centsCount;
      lastCommitMs = nowMs;

      if (previousCommittedMidi !== null && previousCommittedMidi !== committedMidi) {
        // New note detected: center needle immediately, then drift to target cents.
        displayedCents = 0;
        updateUIFromCommittedState(0);
      }

      if (committedMidi >= MIN_MIDI && committedMidi <= MAX_MIDI) {
        const canScroll = nowMs - lastAutoScrollMs >= AUTO_SCROLL_DEBOUNCE_MS;
        setKeyHighlight(committedMidi, canScroll);
        if (canScroll) lastAutoScrollMs = nowMs;
      }

      if (historyEnabled && previousCommittedMidi !== committedMidi) {
        noteHistory = noteHistory.filter((midi) => midi !== committedMidi);
        noteHistory.push(committedMidi);
        if (noteHistory.length > historyLimit) {
          noteHistory = noteHistory.slice(noteHistory.length - historyLimit);
        }
        renderHistoryDots();
      }
    }

    function analyse() {
      analyser.getFloatTimeDomainData(buffer);
      const detection = detectPitchYIN(buffer, audioContext.sampleRate);
      frameCounter += 1;

      if (detection) {
        needle.style.opacity = "1";
        noPitchFrames = 0;
        silenceStartMs = null;
        silenceCleared = false;
        emaFrequency = emaFrequency === null
          ? detection.frequency
          : emaFrequency + FREQ_EMA_ALPHA * (detection.frequency - emaFrequency);

        const midiFloat = frequencyToMidi(emaFrequency);
        const nearestMidi = Math.round(midiFloat);
        const rawCents = centsOff(emaFrequency, nearestMidi);
        pushPitchFrame(nearestMidi, rawCents);
        tryCommitDominantNote(performance.now());
      } else {
        needle.style.opacity = "0";
        noPitchFrames += 1;
        if (silenceStartMs === null) {
          silenceStartMs = performance.now();
        }
        const silenceElapsed = performance.now() - silenceStartMs;
        if (silenceElapsed >= SILENCE_RESET_MS && !silenceCleared) {
          resetPitchTracking();
          pitchPanel.style.backgroundColor = "#24322a";
          needle.style.left = "50%";
          needle.style.opacity = "1";
          clearKeyHighlight();
          centsIndicator.style.display = "none";
          needle.classList.remove("locked");
          silenceCleared = true;
        }
      }

      if (detection && committedMidi !== null) {
        displayedCents += DISPLAY_CENTS_ALPHA * (committedCents - displayedCents);
        updateUIFromCommittedState(displayedCents);
      }

      animationId = requestAnimationFrame(analyse);
    }

    function resetAppUI() {
      pitchPanel.style.backgroundColor = "#24322a";
      needle.style.left = "50%";
      needle.style.opacity = "1";
      centsIndicator.style.display = "none";
      needle.classList.remove("locked");
      clearKeyHighlight();
    }

    async function stopMicrophone() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      stopReferenceTone();
      if (micStream) {
        for (const track of micStream.getTracks()) {
          track.stop();
        }
        micStream = null;
      }
      if (audioContext && audioContext.state !== "closed") {
        await audioContext.close();
      }
      audioContext = null;
      analyser = null;
      buffer = null;
      highPassFilter = null;
      frameCounter = 0;
      noPitchFrames = 0;
      silenceStartMs = null;
      silenceCleared = false;
      noteHistory = [];
      clearHistoryDots();
      resetPitchTracking();
      resetAppUI();
      startBtn.textContent = "Start microphone";
    }

    async function startMicrophone() {
      try {
        if (audioContext) return;
        if (!AudioContextClass) {
          return;
        }
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          return;
        }

        // iOS Safari: create and resume AudioContext inside direct tap handler.
        audioContext = new AudioContextClass();
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micStream = stream;

        const source = audioContext.createMediaStreamSource(stream);
        highPassFilter = audioContext.createBiquadFilter();
        highPassFilter.type = "highpass";
        highPassFilter.frequency.value = 80;
        highPassFilter.Q.value = 0.707;

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 4096;
        analyser.smoothingTimeConstant = 0;
        buffer = new Float32Array(analyser.fftSize);

        source.connect(highPassFilter);
        highPassFilter.connect(analyser);
        startBtn.textContent = "Stop microphone";
        analyse();
      } catch (err) {
        if (audioContext && audioContext.state !== "closed") {
          await audioContext.close();
        }
        audioContext = null;
        micStream = null;
        console.error(err);
      }
    }

    startBtn.addEventListener("click", async () => {
      if (audioContext) {
        await stopMicrophone();
      } else {
        await startMicrophone();
      }
    });

    historyToggleBtn.addEventListener("click", () => {
      historyEnabled = !historyEnabled;
      if (!historyEnabled) {
        noteHistory = [];
      }
      renderHistoryDots();
    });

    historyLimitSelect.addEventListener("change", () => {
      historyLimit = Number(historyLimitSelect.value);
      if (noteHistory.length > historyLimit) {
        noteHistory = noteHistory.slice(noteHistory.length - historyLimit);
      }
      renderHistoryDots();
    });

    window.addEventListener("beforeunload", () => {
      if (animationId) cancelAnimationFrame(animationId);
      stopReferenceTone();
      if (audioContext) audioContext.close();
      if (toneContext && toneContext !== audioContext) toneContext.close();
    });

    renderHistoryDots();
    document.documentElement.style.setProperty("--zoom", zoom.toFixed(2));
  </script>
</body>
</html>
